name: Nightly Pipeline

on:
  schedule:
    - cron: "0 3 * * *"   # 3 AM UTC — after Cricsheet publishes daily updates
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
      AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
      AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      # ── Bronze ────────────────────────────────────────────────────────────────
      - name: Download incremental data from Cricsheet
        run: python ingestion/download.py incremental

      - name: Upload new JSON files to ADLS bronze
        run: python ingestion/bronze_loader.py

      # ── Silver ────────────────────────────────────────────────────────────────
      - name: Transform new files to silver Parquet
        run: python ingestion/silver_transformer.py --mode incremental --since-days 2

      - name: Upload new silver Parquet to ADLS
        run: python ingestion/silver_loader.py

      # ── Gold (dbt) ────────────────────────────────────────────────────────────
      - name: dbt seed
        working-directory: dbt_project
        run: dbt seed --profiles-dir . --target prod

      - name: dbt run
        working-directory: dbt_project
        run: >
          dbt run
          --profiles-dir . --target prod
          --vars '{"silver_path": "az://cricket-data/silver"}'

      - name: dbt test
        working-directory: dbt_project
        run: >
          dbt test
          --profiles-dir . --target prod
          --vars '{"silver_path": "az://cricket-data/silver"}'
