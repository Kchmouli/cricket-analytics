version: 2

sources:
  - name: silver
    description: "Normalized silver layer — generated by ingestion/silver_transformer.py"
    tables:
      - name: matches
        description: "One row per match"
        meta:
          external_location: "read_parquet('{{ var(\"silver_path\") }}/matches/**/*.parquet', hive_partitioning=true, union_by_name=true)"

      - name: innings
        description: "One row per innings"
        meta:
          external_location: "read_parquet('{{ var(\"silver_path\") }}/innings/**/*.parquet', hive_partitioning=true, union_by_name=true)"

      - name: deliveries
        description: "One row per ball bowled"
        meta:
          external_location: "read_parquet('{{ var(\"silver_path\") }}/deliveries/**/*.parquet', hive_partitioning=true, union_by_name=true)"

      - name: players
        description: "Playing XI per match per team (from info.players, not registry)"
        meta:
          external_location: "read_parquet('{{ var(\"silver_path\") }}/players/**/*.parquet', hive_partitioning=true, union_by_name=true)"
