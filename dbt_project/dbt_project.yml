name: cricket_analytics
version: "1.0.0"
config-version: 2

profile: cricket_analytics

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Override for prod: dbt run --vars '{"silver_path": "abfs://cricket-data@cricketanalyticsdata.dfs.core.windows.net/silver"}'
  silver_path: "../data/silver"

models:
  cricket_analytics:
    staging:
      +materialized: table
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
